# 使用 Changesets：有待处理的 .changeset 时打开「版本」PR；合并后再次 push 到 master 时执行发布。
# 参考 changesets/action 推荐用法，结合 npm OIDC 可信发布（无需 NPM_TOKEN）。
name: Build and Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write # npm 可信发布 / provenance 需要

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
  # changeset 调起 npm/pnpm publish 时继承，生成 provenance
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  release:
    name: Version or Publish
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # 安装依赖时拉取 GitHub Packages（如 @icqqjs/*）需要 token
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PKG_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Test
        run: pnpm test
        continue-on-error: true

      - name: Bump versions or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm bump
          commit: "chore: version packages"
          title: "chore: version packages"
          publish: pnpm pub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read root version after publish
        id: pkg_version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create git tags
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          MAIN_VERSION=$(jq -r '.version' package.json)
          git tag -a "v${MAIN_VERSION}" -m "Release v${MAIN_VERSION}" 2>/dev/null || echo "Root tag exists or skip"

          for pkg in packages/*/package.json protocols/*/*/package.json adapters/*/package.json; do
            if [ -f "$pkg" ]; then
              name=$(jq -r '.name' "$pkg")
              version=$(jq -r '.version' "$pkg")
              private=$(jq -r '.private // false' "$pkg")
              if [ "$private" = "false" ]; then
                git tag -a "${name}@${version}" -m "Release ${name}@${version}" 2>/dev/null || true
              fi
            fi
          done

          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog excerpt
        if: steps.changesets.outputs.published == 'true'
        run: |
          if [ -f "CHANGELOG.md" ]; then
            awk '/^## /{p++} p==1' CHANGELOG.md > RELEASE_NOTES.md
          else
            echo "# Release Notes" > RELEASE_NOTES.md
            echo "See individual package CHANGELOG.md files for details." >> RELEASE_NOTES.md
          fi

      - name: GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: ncipollo/release-action@v1
        with:
          bodyFile: "RELEASE_NOTES.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "v${{ steps.pkg_version.outputs.version }}"
          name: "🚀 OneBots v${{ steps.pkg_version.outputs.version }}"
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
