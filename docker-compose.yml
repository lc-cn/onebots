# OneBots 网关 - Docker Compose（使用官方镜像，无需本地构建）
# 使用：docker compose up -d
# 配置与数据持久化在 ./data 目录

services:
  onebots:
    image: ghcr.io/lc-cn/onebots:master
    container_name: onebots
    restart: unless-stopped
    ports:
      - "6727:6727"
    volumes:
      # 配置与数据持久化（config.yaml、SQLite、日志等）
      - ./data:/data
    environment:
      - NODE_ENV=production
